<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanEatPro - Lazeez Biryani</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand-logo">
                <img src="logo.png" alt="Logo" class="restaurant-logo">
                <div>
                    <span class="brand-top">LAZEEZ</span><br>
                    <span class="brand-bottom">BIRYANI & HOTEL</span>
                </div>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-bell" onclick="callWaiter()" id="waiter-bell" title="Call Waiter"></i>
                
                <i class="fa-solid fa-moon" onclick="toggleDarkMode()"></i>
                <div class="nav-item cart-btn" onclick="toggleCart()">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="cart-badge" id="cart-count">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="old-tools">
            <input type="text" id="menuSearch" placeholder="🔍 Search dish..." onkeyup="searchMenu()">
            <div class="filter-box">
                <button class="btn-f active" onclick="filterMenu('all')">All</button>
                <button class="btn-f" onclick="filterMenu('veg')">Veg</button>
                <button class="btn-f" onclick="filterMenu('non-veg')">Non-Veg</button>
            </div>
        </div>

        <h2 class="section-heading">OUR MENU</h2>

        <div class="category-grid-container" id="menu-grid">
            <div class="category-item" data-type="non-veg" onclick="addToCart('Chicken Biryani', 160)">
                <div class="cat-img-box"><img src="biryani.jpg"></div>
                <p class="item-name">Chicken Biryani</p>
                <p class="item-price">₹160</p>
            </div>
            <div class="category-item" data-type="non-veg" onclick="addToCart('Chicken Rice', 90)">
                <div class="cat-img-box"><img src="rice.jpg"></div>
                <p class="item-name">Chicken Rice</p>
                <p class="item-price">₹90</p>
            </div>
            <div class="category-item" data-type="non-veg" onclick="addToCart('Chicken Gravy', 120)">
                <div class="cat-img-box"><img src="gravy.jpg"></div>
                <p class="item-name">Chicken Gravy</p>
                <p class="item-price">₹120</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Puri Sabji', 35)">
                <div class="cat-img-box"><img src="puri.jpg"></div>
                <p class="item-name">Puri Sabji</p>
                <p class="item-price">₹35</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Roti', 7)">
                <div class="cat-img-box"><img src="roti.jpg"></div>
                <p class="item-name">Roti</p>
                <p class="item-price">₹7</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Lachha Pratha', 15)">
                <div class="cat-img-box"><img src="pratha.jpg"></div>
                <p class="item-name">Lachha Pratha</p>
                <p class="item-price">₹15</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Veg Sabji', 35)">
                <div class="cat-img-box"><img src="veg.jpg"></div>
                <p class="item-name">Veg Sabji</p>
                <p class="item-price">₹35</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Sada Khana', 70)">
                <div class="cat-img-box"><img src="sada.jpg"></div>
                <p class="item-name">Sada Khana</p>
                <p class="item-price">₹70</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Pani Bottle (S)', 10)">
                <div class="cat-img-box"><img src="water10.jpg"></div>
                <p class="item-name">Pani Bottle (S)</p>
                <p class="item-price">₹10</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Pani Bottle (M)', 20)">
                <div class="cat-img-box"><img src="water20.jpg"></div>
                <p class="item-name">Pani Bottle (M)</p>
                <p class="item-price">₹20</p>
            </div>
            <div class="category-item" data-type="veg" onclick="addToCart('Pani Bottle (L)', 30)">
                <div class="cat-img-box"><img src="water30.jpg"></div>
                <p class="item-name">Pani Bottle (L)</p>
                <p class="item-price">₹30</p>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Order</h3>
            <i class="fa-solid fa-xmark" onclick="toggleCart()" style="cursor:pointer"></i>
        </div>
        <div id="cart-items-list" class="cart-body"></div>
        <div class="cart-total-section">
            <span>Total:</span>
            <span id="cart-total-price">₹0</span>
        </div>
        <button class="checkout-btn" onclick="openOrderPopup()">Order Now</button>
    </div>

    <div id="order-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="color:#d62300">Confirm Order</h3>
            <input type="number" id="table-no" placeholder="Table Number">
            <select id="payment-mode">
                <option value="Cash">Cash (Offline)</option>
                <option value="Online">Online Payment</option>
            </select>
            <button class="confirm-btn" onclick="confirmFinalOrder()">Confirm & WhatsApp</button>
            <button class="cancel-btn" onclick="closeOrderPopup()">Cancel</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
